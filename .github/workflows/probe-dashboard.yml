name: Probe Dashboard

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: probe-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build probe dashboard
        env:
          PROBE_SUMMARY_URL: ${{ vars.PROBE_SUMMARY_URL || 'https://tgw.logox.top/probe/summary' }}
          PROBE_AUTH_TOKEN: ${{ secrets.PROBE_AUTH_TOKEN }}
        run: python3 probe_dashboard/scripts/probe_dashboard.py

      - name: Commit probe history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add probe_dashboard/pages
          git diff --cached --quiet || git commit -m "Update probe dashboard [skip ci]"
          git pull --rebase --autostash
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: probe_dashboard/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
