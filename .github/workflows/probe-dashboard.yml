name: Probe Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/probe-dashboard.yml"
      - "CNAME"
      - "index.html"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: probe-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage publish files
        run: |
          rm -rf site
          mkdir -p site
          cp index.html site/index.html
          cp CNAME site/CNAME

      - name: Deploy probe dashboard
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          cname: monitor.logox.top
          force_orphan: false
          user_name: github-actions
          user_email: github-actions@github.com
